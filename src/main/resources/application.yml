spring:
  application:
    name: lmfinanz-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/lmfinanz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:lmfinanz}
    password: ${SPRING_DATASOURCE_PASSWORD:lmfinanz}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    issuer: lmfinanz
    secret: ${JWT_SECRET:lmfinanz-development-secret-key-change-before-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
